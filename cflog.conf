# Polling: accepts Go duration syntax e.g. 30s, 2m
poll_interval = 15m

# Cloudflare
#cloudflare_api_token  = <token>      # token with read access to accountanalytics, zone logs and zone analytics 
#cloudflareemail       = <email>
#cloudflare_zone_ids   = zone1,zone2  # leave empty for all zones/domains
#cloudflare_account_id = <account id> # required for collecting R2 access logs

# OpenObserve
#openobserve_url  = <openobserve url>
#openobserve_user = <user>
#openobserve_pass = <pass>

# Splunk
#splunk_url   = <splunk input url>
#splunk_token = <token>
